<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUN - Fisika UNpar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .fun-text {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .letter {
            font-size: 180px;
            font-weight: bold;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: bounce 2s ease-in-out infinite;
        }

        .letter-f {
            animation-delay: 0s;
        }

        .letter-u {
            font-size: 180px;
            animation-delay: 0.2s;
            position: relative;
        }

        /* Smiley Face U */
        .smiley-u {
            display: inline-block;
            width: 160px;
            height: 160px;
            background: #FFD700;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
            animation: bounce 2s ease-in-out infinite, rotate 4s linear infinite;
            animation-delay: 0.2s, 0s;
        }

        .eye {
            position: absolute;
            width: 20px;
            height: 30px;
            background: #333;
            border-radius: 50%;
            top: 50px;
        }

        .eye-left {
            left: 45px;
            animation: blink 3s ease-in-out infinite;
        }

        .eye-right {
            right: 45px;
            animation: blink 3s ease-in-out infinite;
            animation-delay: 0.1s;
        }

        .smile {
            position: absolute;
            width: 80px;
            height: 40px;
            border: 6px solid #333;
            border-top: none;
            border-radius: 0 0 80px 80px;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
        }

        .letter-n {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        @keyframes rotate {
            0%, 90%, 100% {
                transform: rotate(0deg);
            }
            95% {
                transform: rotate(10deg);
            }
        }

        @keyframes blink {
            0%, 90%, 100% {
                height: 30px;
            }
            95% {
                height: 5px;
            }
        }

        .tagline {
            font-size: 36px;
            color: white;
            margin: 30px 0;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
            animation-delay: 1s;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 24px;
            color: #FFD700;
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
            animation-delay: 2s;
            font-style: italic;
        }

        .university {
            font-size: 28px;
            color: white;
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
            animation-delay: 3s;
            font-weight: 300;
        }

        /* Mascot Cat Animation */
        .mascot-container {
            position: absolute;
            bottom: 20%;
            left: 15%;
            z-index: 20;
            opacity: 0;
            animation: mascotEnter 2s ease-out forwards;
            animation-delay: 4s;
            transform-origin: bottom center;
        }

        @keyframes mascotEnter {
            0% {
                opacity: 0;
                transform: translateY(100px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .mascot-cat {
            position: relative;
            display: inline-block;
        }

        .mascot-image {
            width: 250px;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            animation: flipAnimation 2s ease-in-out infinite;
        }

        .mascot-image-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            animation: flipAnimation2 2s ease-in-out infinite;
        }

        @keyframes flipAnimation {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        @keyframes flipAnimation2 {
            0%, 49% {
                opacity: 0;
            }
            50%, 100% {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Physics particles */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .atom {
            position: absolute;
            width: 100px;
            height: 100px;
            opacity: 0.3;
            animation: spin 10s linear infinite;
        }

        .atom-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .atom-2 { top: 20%; right: 15%; animation-delay: 2s; }
        .atom-3 { bottom: 15%; left: 20%; animation-delay: 4s; }
        .atom-4 { bottom: 20%; right: 10%; animation-delay: 6s; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .atom::before,
        .atom::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #FFD700;
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        .atom::before {
            transform: rotateY(60deg);
        }

        .atom::after {
            transform: rotateY(-60deg);
        }

        .nucleus {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #FFD700;
        }
    </style>
</head>
<body>
    <!-- Physics atom decorations -->
    <div class="atom atom-1"><div class="nucleus"></div></div>
    <div class="atom atom-2"><div class="nucleus"></div></div>
    <div class="atom atom-3"><div class="nucleus"></div></div>
    <div class="atom atom-4"><div class="nucleus"></div></div>

    <div class="container">
        <div class="fun-text">
            <div class="letter letter-f">F</div>
            <div class="smiley-u">
                <div class="eye eye-left"></div>
                <div class="eye eye-right"></div>
                <div class="smile"></div>
            </div>
            <div class="letter letter-n">N</div>
        </div>
        
        <div class="tagline">Fisika UNpar</div>
        <div class="subtitle">Physics is Always FUN!</div>
        <div class="university">Parahyangan Catholic University</div>
    </div>

    <!-- Animated Mascot Cat -->
    <div class="mascot-container">
        <div class="mascot-cat">
            <img src="mascot_fun.png" alt="FUN Mascot" class="mascot-image">
            <img src="mascot_fun2.png" alt="FUN Mascot" class="mascot-image-2">
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.body;
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
